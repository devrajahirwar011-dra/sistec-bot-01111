version: '3.8'

services:
  # Streamlit UI
  sistec-ui:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: sistec-ui
    ports:
      - "8501:8501"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      VECTOR_DB_TYPE: chroma
      DOCUMENTS_PATH: /app/documents
    volumes:
      - ./documents:/app/documents
      - ./vector_store:/app/vector_store
      - ./logs:/app/logs
    depends_on:
      - sistec-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI Backend
  sistec-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sistec-api
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      VECTOR_DB_TYPE: chroma
      DOCUMENTS_PATH: /app/documents
    volumes:
      - ./documents:/app/documents
      - ./vector_store:/app/vector_store
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
